# BEGIN_KITTY_FONTS
font_family      family="JetMaple Mono"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS

# BEGIN_KITTY_THEME
# Solarized Dark - Patched
include current-theme.conf
# END_KITTY_THEME

# Custom settings
## Font
font_size 15.0

## Background
background #001419
background_opacity 0.9
background_blur 20

## Shotcuts
kitty_mod cmd+shift
map kitty_mod+l next_tab
map kitty_mod+h previous_tab
map kitty_mod+m toggle_layout stack
map kitty_mod+z toggle_layout stack
map kitty_mod+enter launch --location=split --cwd=current
map kitty_mod+\ launch --location=vsplit --cwd=current
map kitty_mod+minus launch --location=hsplit --cwd=currentt
map kitty_mod+left neighboring_window left
map kitty_mod+right neighboring_window right
map kitty_mod+up neighboring_window up
map kitty_mod+down neighboring_window down
map kitty_mod+s show_scrollback
map kitty_mod+r load_config_file

## Window
remember_window_size no
remember_window_position no
initial_window_width 800
initial_window_height 600

## Misc
enabled_layouts Splits,Stack
copy_on_select yes

## Macos
macos_option_as_alt both
macos_quit_when_last_window_closed yes
